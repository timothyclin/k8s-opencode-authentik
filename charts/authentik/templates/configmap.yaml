apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "authentik.fullname" . }}-authentik
data:
  # Authentik configuration
  authentik.yml: |
    # Basic configuration
    debug: false
    secret_key: /secrets/secretKey
    disable_startup_analytics: true

    # Database
    database:
      host: {{ include "authentik.fullname" . }}-authentik-postgres
      name: {{ .Values.postgres.database }}
      user: {{ .Values.postgres.username }}
      password: /secrets/postgresPassword

    # Redis
    redis:
      host: {{ include "authentik.fullname" . }}-authentik-redis
      password: /secrets/redisPassword

    # Email (disabled for this use case)
    email:
      backend: dummy

    # OIDC provider settings (configured via UI after deployment)
    oidc:
      enabled: {{ .Values.oidc.enabled }}
      {{- if .Values.oidc.issuerUrl }}
      issuer_url: {{ .Values.oidc.issuerUrl }}
      {{- end }}
