# Authentik domain (must match Tailscale ingress)
domain: "authentik.example.ts.net"

authentik:
  enabled: true
  secretKey: "CHANGE-ME-TO-SECURE-32-CHAR-STRING"
  image:
    repository: ghcr.io/goauthentik/server
    tag: "2026.2.2"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  postgres:
    password: "CHANGE_ME_SECURE_POSTGRES_PASSWORD"
    database: "authentik"
    username: "authentik"
  redis:
    password: "CHANGE_ME_SECURE_REDIS_PASSWORD"
  oidc:
    enabled: false
    issuerUrl: ""
    clientId: ""
    clientSecret: ""
    scopes: ["openid", "email", "profile"]

# Proxy configuration for cookie domain
proxy:
  enabled: true
  hostname: "authentik.example.ts.net"
  cookieDomain: ".example.ts.net"

# PostgreSQL configuration
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "15"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 10Gi

# Redis configuration
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Tailscale ingress
ingress:
  enabled: true
  hostname: "authentik"
  tailscale:
    proxyTag: "tag:k8s"