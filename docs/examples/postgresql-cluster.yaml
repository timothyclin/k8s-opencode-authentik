# docs/examples/postgresql-cluster.yaml
# CloudNativePG cluster configuration for Authentik
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-db
  namespace: {{NAMESPACE}}
spec:
  instances: 2
  
  # PostgreSQL version
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  
  # Storage configuration
  storage:
    size: 10Gi
    storageClass: {{STORAGE_CLASS}}  # Replace with your selected storage class
    
  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
      
  # Resource limits
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # High availability (single instance for simplicity)
  maxSyncReplicas: 0
  minSyncReplicas: 0

  # Maintenance
  enableSuperuserAccess: false